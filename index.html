<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#F4F2FB">
    <meta name="description" content="Jo's Hyrox Training — Tampa Doubles + Dallas Solo 2026">
    <title>HYROX — Jo</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
html{height:100%;overflow:hidden;-webkit-text-size-adjust:100%}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
input,textarea{font-family:inherit;color:inherit}
:root{
  --bg:#F4F2FB;--bg2:#E8E4F2;--bg3:#DAD3EB;--surface:#FFFFFF;
  --text:#1A1530;--text2:rgba(26,21,48,.6);--text3:rgba(26,21,48,.38);
  --accent:#7C3AED;--accent-dim:rgba(124,58,237,.1);
  --border:rgba(26,21,48,.08);
  --green:#10B981;--red:#DC2626;--blue:#3B82F6;--orange:#7C3AED;
  --font:'Inter',system-ui,-apple-system,sans-serif;
  --safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);--nav:64px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.4;position:fixed;width:100%;height:100%;overflow:hidden}
#app{position:fixed;top:0;left:0;right:0;bottom:var(--nav);overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:var(--safe-b)}
#app::-webkit-scrollbar{display:none}
.nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);background:rgba(245,239,230,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding-bottom:var(--safe-b);z-index:100}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 16px;color:var(--text3);transition:color .15s}
.nav-btn span{font-size:10px;font-weight:600;letter-spacing:.3px}
.nav-btn.active{color:var(--accent)}
.nav-btn:active{opacity:.7}
.view{padding:20px;padding-top:calc(var(--safe-t) + 16px);min-height:100%;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.t-xs{font-size:11px}.t-sm{font-size:13px}.t-md{font-size:15px}.t-lg{font-size:18px}.t-xl{font-size:22px}.t-2xl{font-size:28px}.t-3xl{font-size:36px}
.t-muted{color:var(--text2)}.t-faint{color:var(--text3)}.t-accent{color:var(--accent)}
.fw-5{font-weight:500}.fw-6{font-weight:600}.fw-7{font-weight:700}.fw-8{font-weight:800}.fw-9{font-weight:900}
.tabular{font-variant-numeric:tabular-nums}
.mb-4{margin-bottom:4px}.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}.mb-20{margin-bottom:20px}.mb-24{margin-bottom:24px}.mb-32{margin-bottom:32px}
.mt-4{margin-top:4px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}
.row{display:flex;align-items:center;gap:12px}
.row-between{display:flex;align-items:center;justify-content:space-between}
.label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px}
.pill{display:inline-flex;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700}
.pill-accent{background:var(--accent-dim);color:var(--accent)}
.pill-green{background:rgba(16,185,129,.12);color:var(--green)}
.z1{background:rgba(59,130,246,.14);color:#3B82F6}.z2{background:rgba(59,130,246,.14);color:#3B82F6}.z3{background:rgba(6,182,212,.14);color:#0E7490}.z4{background:rgba(124,58,237,.14);color:var(--accent)}.z5{background:rgba(220,38,38,.14);color:#6D28D9}
.btn{padding:14px 24px;border-radius:12px;font-size:15px;font-weight:700;text-align:center;width:100%;transition:opacity .15s}
.btn-accent{background:var(--accent);color:#FFF}
.btn:active{opacity:.8}
.input{background:#FFF;border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:14px;font-weight:600;text-align:center;width:100%;outline:none;font-variant-numeric:tabular-nums}
.input::placeholder{color:var(--text3);font-weight:400}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(124,58,237,.1)}
.textarea{background:#FFF;border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-size:14px;width:100%;resize:none;outline:none;min-height:48px}
.textarea::placeholder{color:var(--text3)}
.ex-row{padding:14px 0;border-bottom:1px solid var(--border)}
.ex-row:last-child{border-bottom:none}
.ex-check{width:28px;height:28px;min-width:28px;border-radius:50%;border:2px solid rgba(26,21,48,.2);display:flex;align-items:center;justify-content:center;transition:all .15s;background:#FFF}
.ex-check.done{background:var(--accent);border-color:var(--accent)}
.ex-check svg{opacity:0;transition:opacity .15s}
.ex-check.done svg{opacity:1}
.set-grid{display:grid;grid-template-columns:32px 1fr 1fr 36px;gap:6px;align-items:center;margin-top:10px;padding-left:40px}
.set-grid-header{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;text-align:center}
.ex-badge{width:26px;height:26px;min-width:26px;border-radius:7px;background:var(--bg3);color:var(--text);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px}
.pill-muted{background:var(--bg2);color:var(--text2)}
.why-box{border-left:3px solid var(--accent);background:var(--accent-dim);border-radius:0 8px 8px 0;padding:8px 12px;margin-top:10px}
.why-label{color:var(--accent);font-weight:800;text-transform:uppercase;font-size:9px;letter-spacing:.6px;display:block;margin-bottom:2px}
.why-text{font-size:12.5px;color:var(--text);line-height:1.45}
.cset-grid{display:grid;grid-template-columns:26px 1fr 1fr 30px;gap:8px;align-items:center;row-gap:9px;margin-top:12px}
.set-check{width:26px;height:26px;min-width:26px;border-radius:50%;border:2px solid var(--text3);display:flex;align-items:center;justify-content:center;background:var(--surface);transition:all .15s;margin:0 auto}
.set-check.on{background:var(--accent);border-color:var(--accent)}
.set-check svg{opacity:0;stroke:#fff;transition:opacity .15s}
.set-check.on svg{opacity:1}
.add-set{width:100%;padding:10px;border-radius:10px;border:1px dashed var(--border);background:transparent;color:var(--text2);font-weight:700;font-size:13px;margin-top:10px}
.add-set:active{opacity:.6}
.rm-set{padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-weight:700;font-size:13px;flex:1}
.rm-set:active{opacity:.6}
.ex-simple{padding:12px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.ex-simple:last-child{border-bottom:none}
.pill-pr{background:var(--accent);color:#fff}
.tabs{display:flex;gap:4px;background:var(--bg2);border-radius:10px;padding:3px;margin-bottom:20px}
.tab{flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:700;text-align:center;color:var(--text2);transition:all .15s}
.tab.active{background:var(--accent);color:#FFF}
.metric{padding:14px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.metric:last-child{border-bottom:none}
.prog{width:100%;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .5s ease}
.card{background:#FFF;border-radius:14px;padding:16px;border:1px solid var(--border)}
.rpe{flex:1;padding:10px 0;background:#FFF;border:1px solid var(--border);border-radius:8px;font-size:14px;font-weight:700;color:var(--text2);text-align:center;cursor:pointer;transition:all .15s}
.rpe.sel{background:var(--accent);color:#FFF;border-color:var(--accent)}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}
.loading-h{font-size:56px;font-weight:900;color:var(--accent);animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.modal-overlay{position:fixed;inset:0;background:rgba(26,21,48,.5);z-index:200;display:flex;align-items:flex-end;animation:fadeIn .2s ease}
.modal{background:var(--bg);width:100%;border-radius:20px 20px 0 0;padding:24px 20px;padding-bottom:calc(20px + var(--safe-b));max-height:80vh;overflow-y:auto}
.modal-day{display:flex;justify-content:space-between;align-items:center;padding:14px 12px;border-radius:10px;cursor:pointer;transition:background .15s}
.modal-day:active{background:var(--bg3)}

    </style>
</head>
<body>
    <div id="app">
        <div class="loading" id="loading">
            <div class="loading-h">H</div>
            <div class="t-sm t-faint">Loading...</div>
        </div>
    </div>
    <nav class="nav" id="nav" style="display:none">
        <button class="nav-btn active" data-view="today">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5h11M6.5 17.5h11M2 12h2M20 12h2M6 6.5V4M6 20v-2.5M18 6.5V4M18 20v-2.5M6 12h12"/></svg>
            <span>Today</span>
        </button>
        <button class="nav-btn" data-view="plan">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span>Plan</span>
        </button>
        <button class="nav-btn" data-view="stats">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V10M18 20V4M6 20v-4"/></svg>
            <span>Stats</span>
        </button>
    </nav>
    <script>
// =============================================
// JO — ATHLETE PROFILE
// Placeholders for baselines fill in after Week 1.
// =============================================

const ATHLETE = {
  name: 'Jo',
  weight: null,
  weightKg: null,

  // Physiological — TBD until baseline
  vo2max: null,
  vo2maxHistory: [],

  // Lactate Threshold — PLACEHOLDER until Week 1 30-min TT
  ltPacePerMile: '9:00',
  ltPaceSeconds: 540,
  ltHeartRate: 175,

  restingHR: null,
  maxHR: null,

  easyPacePerMile: '10:30',
  easyPaceSeconds: 630,

  // Strength baselines — TBD Week 1 (5RMs)
  squat1RM: null,
  deadlift1RM: null,
  ohp1RM: null,
  benchPress1RM: null,

  // Hyrox — racing Men's Open weights
  category: 'Men Open (Doubles)',
  sledPushWeight: '152 kg',
  sledPullWeight: '103 kg',
  wallBallWeight: '9 kg',
  wallBallTarget: '3.05 m',
  farmersCarryWeight: '2 × 24 kg',
  sandbagLungeWeight: '20 kg',

  // Race 1: Tampa Mixed Doubles (Oct 23) — with Aidan
  // Race 2: Dallas Solo (Nov 20)
  doublesRace: 'Tampa',
  doublesDate: '2026-10-23',
  doublesGoal: '1:07:00',

  goalRace: 'Dallas',
  goalDate: '2026-11-20',
  goalTimeA: '1:25:00',
  goalTimeStretch: '1:20:00',
  goalTimeDream: '1:15:00',
  prTime: '—',
  pr5K: null,
  pr5KDate: '2026-05-26',
  currentWeeklyMileage: 12,

  trainingStart: '2026-06-22',
  totalWeeks: 24,
  restDay: 'Sunday'
};

// No race history yet — Tampa is Jo's first.
const RACES = [];

// Goal splits (Tampa Mixed Doubles — sub-1:07)
const GOAL_SPLITS = {
  totalTime: '1:07:00',
  totalSeconds: 4020,
  runs: { avgPace: '7:50', avgSeconds: 470, total: '40:00', totalSeconds: 2400 },
  stations: {
    'SkiErg':      { target: '04:30', seconds: 270 },
    'Sled Push':   { target: '03:30', seconds: 210 },
    'Sled Pull':   { target: '04:30', seconds: 270 },
    'Burpee BJ':   { target: '04:00', seconds: 240 },
    'Row':         { target: '04:30', seconds: 270 },
    'Farmers C.':  { target: '02:00', seconds: 120 },
    'S. Lunges':   { target: '04:00', seconds: 240 },
    'Wall Balls':  { target: '05:00', seconds: 300 }
  },
  roxzone: { target: '04:30', seconds: 270 }
};

// =============================================
// ZONES — Calculated from placeholder LT (9:00/mile).
// Recalibrate after Week 1 30-min TT.
// =============================================

const ZONES = [
  { zone: 1, name: 'Recovery',     paceRange: '12:07 – 13:02', paceMinSec: 727, paceMaxSec: 782, hrRange: '< 140',     hrMin: 0,   hrMax: 140, color: '#3B82F6', description: 'Very easy, conversational. Active recovery days.', feel: 'Could talk in full paragraphs' },
  { zone: 2, name: 'Easy Aerobic', paceRange: '10:43 – 11:39', paceMinSec: 643, paceMaxSec: 699, hrRange: '140 – 155', hrMin: 140, hrMax: 155, color: '#10B981', description: 'Comfortable, sustainable for hours. 80% of your running should live here.', feel: 'Could hold a conversation easily' },
  { zone: 3, name: 'Tempo',        paceRange: '9:38 – 10:14',  paceMinSec: 578, paceMaxSec: 614, hrRange: '155 – 168', hrMin: 155, hrMax: 168, color: '#06B6D4', description: 'Comfortably hard. Sustained tempo.', feel: 'Can speak in short sentences' },
  { zone: 4, name: 'Threshold',    paceRange: '8:50 – 9:18',   paceMinSec: 530, paceMaxSec: 558, hrRange: '168 – 178', hrMin: 168, hrMax: 178, color: '#7C3AED', description: 'Hard. Right at lactate threshold — your Hyrox race-pace target.', feel: 'Can only say a few words' },
  { zone: 5, name: 'VO2 Max',      paceRange: '7:54 – 8:32',   paceMinSec: 474, paceMaxSec: 512, hrRange: '178 – 192', hrMin: 178, hrMax: 192, color: '#5B21B6', description: 'Very hard. 3-8 minute intervals.', feel: 'Cannot speak, focused on breathing' }
];

function getZoneForHR(hr) {
  for (let i = ZONES.length - 1; i >= 0; i--) {
    if (hr >= ZONES[i].hrMin) return ZONES[i];
  }
  return ZONES[0];
}

function getZoneColor(zone) {
  const z = ZONES.find(z => z.zone === zone);
  return z ? z.color : '#fff';
}

// Inert — Jo's plan uses inline detail.
const EXERCISES = {};
const WORKOUT_DETAILS = {};

// =============================================
// 26-WEEK PLAN — Jo
// Start: May 25, 2026 (Mon)
// Race 1: Tampa Mixed Doubles — Fri Oct 23, 2026 (Week 22)
// Race 2: Dallas Solo           — Fri Nov 20, 2026 (Week 26)
// =============================================

// ===== JO PLAN v5 — single sessions around her schedule (works Wed-Sun 10-4) =====
// Start: Mon Jun 22, 2026 (aligned with Aidan)
// 24 weeks total to Dallas Nov 20
//
// Weekly split (SINGLE sessions, sim on a free day at the far gym):
//   Mon: Long Easy Run (free day)
//   Tue: Heavy Lower (free day)
//   Wed: Heavy Upper (work day, before 10 or after 4)
//   Thu: Sim with Aidan (far gym, 5-8 AM before work)
//   Fri: REST (works 10-4)
//   Sat: Threshold Intervals (work day, before 10 or after 4)
//   Sun: Easy Run + Posterior (work day)
//
// Key differences from Aidan's plan:
// - NO VO2 session (Fri = REST instead of VO2)
// - Sun = Light Posterior (Aidan's is REST + Mobility)
// - Mileage 18 → 35 mi/wk (vs Aidan 25 → 50)
// - Long run 60 → 85 min (vs Aidan 75 → 100)
// - Threshold 4×800m → 6×1km (vs Aidan 8×1km)
// - Hypertrophy volume on Tue Heavy Lower (Leg Press); hamstrings via leg curl on Sun posterior
// - Pull-focused Wed Upper (4 pull movements, 2 push)
// - Bulgarian Split Squats replace lunges
// - Step-Ups replace glute bridge w/ band
// - Race weights from Wk 1 (no technique-only phase)

const PHASES = [
  { id: 'foundation',   name: 'Foundation Base',         weeks: [1, 12],   color: '#3B82F6', emoji: '⚡' },
  { id: 'build',        name: 'Race-Specific Build',     weeks: [13, 17],  color: '#FF8C00', emoji: '🎯' },
  { id: 'tampa',        name: 'Tampa Race Week',         weeks: [18, 18],  color: '#9333EA', emoji: '🏁' },
  { id: 'dallas_build', name: 'Dallas Solo Build',       weeks: [19, 21],  color: '#E8552E', emoji: '⚔️' },
  { id: 'dallas',       name: 'Dallas Race Week',        weeks: [22, 22],  color: '#FFE500', emoji: '🔥' },
  { id: 'reset',        name: 'Reset + Recovery',        weeks: [23, 24],  color: '#64748B', emoji: '🌱' }
];

function getPhase(weekNum) {
  return PHASES.find(p => weekNum >= p.weeks[0] && weekNum <= p.weeks[1]) || PHASES[0];
}

function isDeloadWeek(weekNum) {
  return [4, 8].includes(weekNum);
}

// ===== WEEK 1 — BASELINE TESTING =====
function getBaselineWeek() {
  return [
    { day:'Monday', type:'run', title:'Long Run Baseline — 60 min', icon:'🏃', zone:2,
      exercises:[
        {name:'Easy Run',detail:'60 min at conversational pace (Z2). NOT a test. Should be able to speak in 3-4 sentence chunks without gasping. LOG: total distance, avg HR, avg pace, how it felt.',zone:2},
      ],
      duration:'60 min', focus:'📍 WHY: Long run baseline. Establishes current easy-pace mileage capacity. The number that drops your HR at the same pace 6 weeks from now = aerobic fitness gain. Run with Aidan if possible.' },

    { day:'Tuesday', type:'strength', title:'Lower Baseline — Find Squat 5RM', icon:'🏋️', zone:0,
      exercises:[
        {name:'Back Squat 5RM',detail:'Work up to a 5-rep max. The heaviest 5 clean reps. Stop if form breaks. LOG weight + RPE on last rep. ANCHOR for next 23 weeks.',zone:0},
        {name:'Romanian Deadlift',detail:'3 × 8 @ challenging but clean weight (test working load)',zone:0},
        {name:'Bulgarian Split Squat',detail:'3 × 8/leg moderate DBs (feel the pattern)',zone:0},
      ],
      duration:'75 min', focus:'📍 WHY: Squat 5RM is the most important strength number for the whole plan. Anchors all lower-body loads for the next 23 weeks. Bulgarian split squat introduced — single-leg work for size + sandbag lunge transfer.' },

    { day:'Wednesday', type:'strength', title:'Upper Baseline — Find 5RMs', icon:'💪', zone:0,
      exercises:[
        {name:'Pull-Up Max (bodyweight)',detail:'Max strict bodyweight reps in one set. Upper-pull benchmark.',zone:0},
        {name:'Overhead Press 5RM',detail:'Work up to a strict 5RM. No leg drive. LOG. Anchors Arnold press + push press loads.',zone:0},
        {name:'Bent-Over Row',detail:'3 × 8 challenging weight (test working load)',zone:0},
        {name:'Face Pulls',detail:'3 × 15 (rear delt baseline)',zone:0},
      ],
      duration:'75 min', focus:'📍 WHY: Log all upper body numbers. These anchor every upper day going forward. Pull-up max sets the benchmark for adding weight progression. Work day, so fit it before 10 AM or after 4 PM.' },

    { day:'Thursday', type:'hyrox', title:'Mini Sim with Aidan — Hyrox Baseline', icon:'🏁', zone:3,
      exercises:[
        {name:'Mini Hyrox',detail:'4 × (1 km run + 1 station). Moderate effort — NOT all-out. Stations rotate: wall ball (9 kg), sled push 25m @ 152 kg, sandbag lunge 20m @ 20 kg, burpees. Tests baseline race-format capacity + station strength. LOG times.',zone:3},
      ],
      duration:'60 min', focus:'📍 WHY: First taste of race format + baseline of which Hyrox stations feel hardest. Goal is information, not a PR. This is the far-gym day: go at 5 AM, done by 8, before the 10 AM shift.' },

    { day:'Friday', type:'rest', title:'Full Rest', icon:'😴', zone:0,
      exercises:[{name:'Rest',detail:'Full recovery. Sleep, hydrate, eat.',zone:0}],
      duration:'—', focus:'📍 WHY: Friday rest. Locked in every week of this plan. Body absorbs the work.' },

    { day:'Saturday', type:'intervals', title:'30-min Threshold TT — Baseline', icon:'⏱️', zone:4,
      exercises:[
        {name:'30-MIN TIME TRIAL',detail:'Run as hard as you can CONTINUOUSLY for 30 min. Treadmill or flat outdoor. Average pace = your current threshold. Don\'t go out too hot — find a hard but sustainable rhythm by min 5. LOG: avg pace, avg HR, how you felt at min 10/20/30.',zone:4},
      ],
      duration:'55 min', focus:'📍 WHY: THE most important test of Week 1. Your 30-min average pace defines your lactate threshold. Every Z1-Z5 band derives from this. Fresh off Friday rest = a clean number. Work day, so run it before 10 AM or after 4 PM.' },

    { day:'Sunday', type:'strength', title:'Posterior Baseline — Find Hip Thrust 5RM', icon:'🦵', zone:0,
      exercises:[
        {name:'Barbell Hip Thrust 5RM',detail:'Work up to a 5-rep max. Top of hip lift, squeeze glutes hard. LOG. Anchors all Sunday posterior work.',zone:0},
        {name:'Single-Leg RDL',detail:'3 × 8/leg moderate DBs (test pattern + balance)',zone:0},
        {name:'Step-Ups',detail:'3 × 10/leg moderate DBs (test single-leg power)',zone:0},
      ],
      duration:'55 min', focus:'📍 WHY: Hip thrust 5RM = #1 posterior chain anchor for sled push power. Step-ups introduced — replaces glute bridge w/ band, better posterior chain stimulus + Hyrox transfer.' }
  ];
}

// ===== PHASE 2 — FOUNDATION (Weeks 2-12) =====
function getFoundationWeek(weekNum) {
  const isDeload = isDeloadWeek(weekNum);
  const phaseWk = weekNum; // 1-12 (no baseline week; full throttle from Week 1)

  const longMin = isDeload ? 45 : Math.min(60 + Math.floor((phaseWk - 1) / 2) * 4, 85);
  const easyMin = isDeload ? 25 : Math.min(25 + Math.floor((phaseWk - 1) / 4) * 5, 40);

  // Threshold progression
  let thresholdSession;
  if (isDeload) thresholdSession = '20 min easy run + 4 strides (deload — no quality)';
  else if (phaseWk <= 2) thresholdSession = '4 × 800m @ threshold pace, 90 sec easy jog rest';
  else if (phaseWk <= 4) thresholdSession = '5 × 800m @ threshold pace, 90 sec rest';
  else if (phaseWk <= 6) thresholdSession = '4 × 1km @ threshold pace, 60 sec rest';

function generateTrainingPlan() {
  const plan = [];
  const startDate = new Date('2026-06-22');

  for (let week = 1; week <= 24; week++) {
    const phase = getPhase(week);
    const deload = isDeloadWeek(week);

    let weekDays;
    if (week <= 12)        weekDays = getFoundationWeek(week);
    else if (week <= 17)   weekDays = getBuildWeek(week);
    else if (week === 18)  weekDays = getTampaRaceWeek();
    else if (week <= 21)   weekDays = getDallasBuildWeek(week);
    else if (week === 22)  weekDays = getDallasRaceWeek();
    else                   weekDays = getResetWeek(week);

    const weekStartDate = new Date(startDate);
    weekStartDate.setDate(weekStartDate.getDate() + (week - 1) * 7);

    plan.push({
      week, phase, deload,
      startDate: new Date(weekStartDate),
      days: weekDays.map((day, i) => {
        const dayDate = new Date(weekStartDate);
        dayDate.setDate(dayDate.getDate() + i);
        return { ...day, date: dayDate, dateStr: dayDate.toISOString().split('T')[0], weekNum: week, dayIndex: i };
      })
    });
  }
  return plan;
}

const TRAINING_PLAN = generateTrainingPlan();

// Read the prescribed number of sets from a detail string like "5 × 5 @ 275 lb"
// or "4 × 25 reps". Returns 1 when there's no leading "N ×" pattern. Capped at 10.
function parseSetCount(detail) {
  if (!detail) return 1;
  const m = detail.match(/^\s*(\d+)\s*[×x]\s*/);
  if (!m) return 1;
  const n = parseInt(m[1], 10);
  if (!n || n < 1) return 1;
  return Math.min(n, 10);
}

// Read the reps token from "N × M ..." (e.g. "5 × 5 @ 275" -> "5", "4 × 25 reps" -> "25").
function parseReps(detail) {
  if (!detail) return '';
  const m = detail.match(/[×x]\s*([0-9][0-9\-–]*(?:\s?(?:reps?|sec|min|m))?(?:\/(?:leg|side))?)/i);
  return m ? m[1].trim() : '';
}

const STORAGE_KEY = 'jo_hyrox_app_data';

const Storage = {
  _data: null,
  
  _load() {
    if (this._data) return this._data;
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      this._data = raw ? JSON.parse(raw) : this._defaults();
    } catch (e) {
      this._data = this._defaults();
    }
    return this._data;
  },
  
  _save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(this._data));
    } catch (e) {
      console.warn('Storage save failed:', e);
    }
  },
  
  _defaults() {
    return {
      completedWorkouts: {},
      vo2maxUpdates: [],
      lastView: 'today',
      preferences: { notifications: true }
    };
  },
  
  // Workout completion
  getWorkout(dateStr) {
    const data = this._load();
    return data.completedWorkouts[dateStr] || null;
  },
  
  saveWorkout(dateStr, workoutData) {
    const data = this._load();
    data.completedWorkouts[dateStr] = {
      completed: true,
      timestamp: new Date().toISOString(),
      ...workoutData
    };
    this._save();
  },
  
  toggleExercise(dateStr, exerciseIndex) {
    const data = this._load();
    if (!data.completedWorkouts[dateStr]) {
      data.completedWorkouts[dateStr] = { completed: false, exercises: {} };
    }
    const workout = data.completedWorkouts[dateStr];
    if (!workout.exercises) workout.exercises = {};
    workout.exercises[exerciseIndex] = !workout.exercises[exerciseIndex];
    
    this._save();
    return workout.exercises[exerciseIndex];
  },
  
  isExerciseComplete(dateStr, exerciseIndex) {
    const data = this._load();
    const workout = data.completedWorkouts[dateStr];
    return workout?.exercises?.[exerciseIndex] || false;
  },
  
  markWorkoutComplete(dateStr, rpe, notes) {
    const data = this._load();
    if (!data.completedWorkouts[dateStr]) {
      data.completedWorkouts[dateStr] = { exercises: {} };
    }
    data.completedWorkouts[dateStr].completed = true;
    data.completedWorkouts[dateStr].rpe = rpe;
    data.completedWorkouts[dateStr].notes = notes;
    data.completedWorkouts[dateStr].timestamp = new Date().toISOString();
    this._save();
  },
  
  isWorkoutComplete(dateStr) {
    const data = this._load();
    return data.completedWorkouts[dateStr]?.completed || false;
  },
  
  // Stats
  getCompletedCount() {
    const data = this._load();
    return Object.values(data.completedWorkouts).filter(w => w.completed).length;
  },
  
  getStreak() {
    const data = this._load();
    const today = new Date();
    let streak = 0;
    let checkDate = new Date(today);
    
    while (true) {
      const dateStr = checkDate.toISOString().split('T')[0];
      const dayOfWeek = checkDate.getDay();
      
      // Skip Sundays (rest day)
      if (dayOfWeek === 0) {
        checkDate.setDate(checkDate.getDate() - 1);
        continue;
      }
      
      if (data.completedWorkouts[dateStr]?.completed) {
        streak++;
        checkDate.setDate(checkDate.getDate() - 1);
      } else {
        // If it's today and not completed yet, check yesterday
        if (dateStr === today.toISOString().split('T')[0]) {
          checkDate.setDate(checkDate.getDate() - 1);
          continue;
        }
        break;
      }
    }
    
    return streak;
  },
  
  // Weekly stats
  getWeeklyCompleted(weekNum) {
    const data = this._load();
    const week = TRAINING_PLAN.find(w => w.week === weekNum);
    if (!week) return { completed: 0, total: 6 };
    
    let completed = 0;
    week.days.forEach(day => {
      if (day.type !== 'rest' && data.completedWorkouts[day.dateStr]?.completed) {
        completed++;
      }
    });
    
    return { completed, total: 6 };
  },
  
  // Preferences
  setLastView(view) {
    const data = this._load();
    data.lastView = view;
    this._save();
  },
  
  getLastView() {
    return this._load().lastView;
  },

  // Exercise logging (weight/reps/sets)
  saveExerciseLog(dateStr, exerciseIndex, logData) {
    const data = this._load();
    if (!data.completedWorkouts[dateStr]) {
      data.completedWorkouts[dateStr] = { completed: false, exercises: {}, logs: {} };
    }
    if (!data.completedWorkouts[dateStr].logs) data.completedWorkouts[dateStr].logs = {};
    data.completedWorkouts[dateStr].logs[exerciseIndex] = logData;
    this._save();
  },

  getExerciseLog(dateStr, exerciseIndex) {
    const data = this._load();
    return data.completedWorkouts[dateStr]?.logs?.[exerciseIndex] || {};
  },

  // Run stats logging
  saveRunStats(dateStr, stats) {
    const data = this._load();
    if (!data.completedWorkouts[dateStr]) {
      data.completedWorkouts[dateStr] = { completed: false, exercises: {}, logs: {} };
    }
    data.completedWorkouts[dateStr].runStats = stats;
    this._save();
  },

  getRunStats(dateStr) {
    const data = this._load();
    return data.completedWorkouts[dateStr]?.runStats || {};
  },

  // Find previous log for same exercise name
  getPreviousLog(currentDateStr, exerciseName) {
    const data = this._load();
    let lastLog = null;
    const dates = Object.keys(data.completedWorkouts).filter(d => d < currentDateStr).sort().reverse();
    for (const d of dates) {
      const w = data.completedWorkouts[d];
      if (!w.logs) continue;
      for (const [idx, log] of Object.entries(w.logs)) {
        if (log.exerciseName !== exerciseName) continue;
        const hasSetData = Array.isArray(log.sets) && log.sets.some(s => s && (s.weight || s.reps));
        if (hasSetData || log.weight || log.reps) return log;
      }
    }
    return null;
  },

  // Heaviest weight ever logged for an exercise BEFORE the given date (for PR detection)
  getMaxWeight(currentDateStr, exerciseName) {
    const data = this._load();
    let max = 0;
    for (const [d, w] of Object.entries(data.completedWorkouts)) {
      if (d >= currentDateStr || !w.logs) continue;
      for (const log of Object.values(w.logs)) {
        if (log.exerciseName !== exerciseName) continue;
        const sets = Array.isArray(log.sets) ? log.sets : [{ weight: log.weight }];
        for (const s of sets) { const n = parseFloat(s?.weight); if (!isNaN(n) && n > max) max = n; }
      }
    }
    return max;
  },

  // Day swaps — swap workouts between days
  swapDays(date1, date2) {
    const data = this._load();
    if (!data.swaps) data.swaps = {};
    // Resolve current swaps so we get the original underlying workouts
    const orig1 = data.swaps[date1] || date1;
    const orig2 = data.swaps[date2] || date2;
    // Set new mappings
    if (orig1 === date2) delete data.swaps[date2]; else data.swaps[date2] = orig1;
    if (orig2 === date1) delete data.swaps[date1]; else data.swaps[date1] = orig2;
    this._save();
  },

  getWorkoutDate(dateStr) {
    // Returns the underlying workout date for a given calendar date (handles swaps)
    const data = this._load();
    return (data.swaps && data.swaps[dateStr]) || dateStr;
  },

  resetSwaps() {
    const data = this._load();
    data.swaps = {};
    this._save();
  },

  // Get all run stats for chart (HR over time at easy pace)
  getAllRunStats() {
    const data = this._load();
    const stats = [];
    for (const [dateStr, workout] of Object.entries(data.completedWorkouts)) {
      if (workout.runStats && workout.runStats.avgHR) {
        stats.push({ date: dateStr, ...workout.runStats });
      }
    }
    return stats.sort((a, b) => a.date.localeCompare(b.date));
  },

};

const Dates = {
  today() {
    return new Date();
  },
  
  todayStr() {
    return this.today().toISOString().split('T')[0];
  },
  
  formatDate(date) {
    if (typeof date === 'string') date = new Date(date + 'T00:00:00');
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  },
  
  formatDateFull(date) {
    if (typeof date === 'string') date = new Date(date + 'T00:00:00');
    return date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  },
  
  formatDateShort(date) {
    if (typeof date === 'string') date = new Date(date + 'T00:00:00');
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  },
  
  getDayName(date) {
    if (typeof date === 'string') date = new Date(date + 'T00:00:00');
    return date.toLocaleDateString('en-US', { weekday: 'long' });
  },
  
  getDayNameShort(date) {
    if (typeof date === 'string') date = new Date(date + 'T00:00:00');
    return date.toLocaleDateString('en-US', { weekday: 'short' });
  },
  
  daysUntil(targetDateStr) {
    const target = new Date(targetDateStr + 'T00:00:00');
    const now = new Date();
    now.setHours(0, 0, 0, 0);
    const diff = target - now;
    return Math.ceil(diff / (1000 * 60 * 60 * 24));
  },
  
  weeksUntil(targetDateStr) {
    return Math.ceil(this.daysUntil(targetDateStr) / 7);
  },
  
  getCurrentWeek() {
    const start = new Date('2026-06-22T00:00:00');
    const now = new Date();
    now.setHours(0, 0, 0, 0);
    const diff = now - start;
    const weekNum = Math.floor(diff / (1000 * 60 * 60 * 24 * 7)) + 1;
    return Math.max(1, Math.min(26, weekNum));
  },
  
  getTodayWorkout() {
    const todayStr = this.todayStr();
    for (const week of TRAINING_PLAN) {
      for (const day of week.days) {
        if (day.dateStr === todayStr) return day;
      }
    }
    return null;
  },
  
  getWeekWorkouts(weekNum) {
    const week = TRAINING_PLAN.find(w => w.week === weekNum);
    return week ? week.days : [];
  },
  
  isToday(dateStr) {
    return dateStr === this.todayStr();
  },
  
  isPast(dateStr) {
    return dateStr < this.todayStr();
  },
  
  isFuture(dateStr) {
    return dateStr > this.todayStr();
  },
  
  countdownTo(targetDateStr) {
    const days = this.daysUntil(targetDateStr);
    const weeks = Math.floor(days / 7);
    const remainingDays = days % 7;
    const months = Math.floor(days / 30);
    const hours = Math.floor((new Date(targetDateStr + 'T08:00:00') - new Date()) / (1000 * 60 * 60));
    
    return { days, weeks, remainingDays, months, hours: Math.max(0, hours) };
  }
};

const Fmt = {
  // Time formatting
  secondsToTime(totalSeconds) {
    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;
    
    if (hours > 0) {
      return `${hours}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }
    return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
  },
  
  timeToSeconds(timeStr) {
    const parts = timeStr.split(':').map(Number);
    if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
    if (parts.length === 2) return parts[0] * 60 + parts[1];
    return 0;
  },
  
  // Pace
  paceDisplay(secondsPerMile) {
    const min = Math.floor(secondsPerMile / 60);
    const sec = Math.round(secondsPerMile % 60);
    return `${min}:${String(sec).padStart(2, '0')}/mile`;
  },
  
  // Diff display
  timeDiff(seconds) {
    const sign = seconds >= 0 ? '+' : '-';
    const abs = Math.abs(seconds);
    const m = Math.floor(abs / 60);
    const s = abs % 60;
    return `${sign}${m}:${String(s).padStart(2, '0')}`;
  },
  
  // Percentage
  percent(value, total) {
    return Math.round((value / total) * 100);
  },
  
  // Ordinal
  ordinal(n) {
    const s = ['th', 'st', 'nd', 'rd'];
    const v = n % 100;
    return n + (s[(v - 20) % 10] || s[v] || s[0]);
  }
};

const Charts = {
  barChart(canvas, data, options = {}) {
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    
    const w = rect.width;
    const h = rect.height;
    const padding = { top: 10, right: 10, bottom: 30, left: 10 };
    const chartW = w - padding.left - padding.right;
    const chartH = h - padding.top - padding.bottom;
    
    const maxVal = Math.max(...data.map(d => d.value)) * 1.1;
    const barWidth = (chartW / data.length) * 0.7;
    const gap = (chartW / data.length) * 0.3;
    
    data.forEach((d, i) => {
      const x = padding.left + i * (barWidth + gap) + gap / 2;
      const barH = (d.value / maxVal) * chartH;
      const y = padding.top + chartH - barH;
      
      // Bar
      ctx.fillStyle = d.color || '#7C3AED';
      ctx.beginPath();
      ctx.roundRect(x, y, barWidth, barH, [4, 4, 0, 0]);
      ctx.fill();
      
      // Label
      ctx.fillStyle = 'rgba(26,21,48,0.45)';
      ctx.font = '10px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(d.label, x + barWidth / 2, h - 5);
    });
  },
  
  // Dual bar chart (for race comparison)
  dualBarChart(canvas, pairs, options = {}) {
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    
    const w = rect.width;
    const h = rect.height;
    const padding = { top: 5, right: 5, bottom: 24, left: 5 };
    const chartW = w - padding.left - padding.right;
    const chartH = h - padding.top - padding.bottom;
    
    const maxVal = Math.max(...pairs.flatMap(p => [p.val1, p.val2])) * 1.1;
    const groupWidth = chartW / pairs.length;
    const barWidth = groupWidth * 0.35;
    
    pairs.forEach((p, i) => {
      const groupX = padding.left + i * groupWidth;
      
      // Bar 1 (Phoenix)
      const h1 = (p.val1 / maxVal) * chartH;
      ctx.fillStyle = 'rgba(124,58,237, 0.55)';
      ctx.beginPath();
      ctx.roundRect(groupX + groupWidth * 0.1, padding.top + chartH - h1, barWidth, h1, [3, 3, 0, 0]);
      ctx.fill();

      // Bar 2 (Houston)
      const h2 = (p.val2 / maxVal) * chartH;
      ctx.fillStyle = 'rgba(59,130,246, 0.5)';
      ctx.beginPath();
      ctx.roundRect(groupX + groupWidth * 0.1 + barWidth + 2, padding.top + chartH - h2, barWidth, h2, [3, 3, 0, 0]);
      ctx.fill();

      // Label
      ctx.fillStyle = 'rgba(26,21,48,0.45)';
      ctx.font = '9px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(p.label, groupX + groupWidth / 2, h - 5);
    });
  },
  
  // Line chart (for VO2 max trend)
  lineChart(canvas, points, options = {}) {
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    
    const w = rect.width;
    const h = rect.height;
    const padding = { top: 15, right: 15, bottom: 30, left: 35 };
    const chartW = w - padding.left - padding.right;
    const chartH = h - padding.top - padding.bottom;
    
    const values = points.map(p => p.value);
    const minVal = Math.min(...values) - 2;
    const maxVal = Math.max(...values) + 2;
    const range = maxVal - minVal;
    
    // Grid lines
    ctx.strokeStyle = 'rgba(26,21,48,0.08)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
      const y = padding.top + (i / 4) * chartH;
      ctx.beginPath();
      ctx.moveTo(padding.left, y);
      ctx.lineTo(w - padding.right, y);
      ctx.stroke();
      
      const val = Math.round(maxVal - (i / 4) * range);
      ctx.fillStyle = 'rgba(26,21,48,0.4)';
      ctx.font = '10px Inter, sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(val, padding.left - 8, y + 4);
    }
    
    // Line
    const color = options.color || '#7C3AED';
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.beginPath();
    
    points.forEach((p, i) => {
      const x = padding.left + (i / (points.length - 1)) * chartW;
      const y = padding.top + ((maxVal - p.value) / range) * chartH;
      
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
    
    // Gradient fill under line
    const gradient = ctx.createLinearGradient(0, padding.top, 0, h - padding.bottom);
    // Convert hex to rgba for gradient
    const hexToRgba = (hex, alpha) => {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    };
    gradient.addColorStop(0, hexToRgba(color, 0.15));
    gradient.addColorStop(1, 'rgba(0,0,0,0)');
    
    ctx.lineTo(padding.left + chartW, padding.top + chartH);
    ctx.lineTo(padding.left, padding.top + chartH);
    ctx.closePath();
    ctx.fillStyle = gradient;
    ctx.fill();
    
    // Points
    points.forEach((p, i) => {
      const x = padding.left + (i / (points.length - 1)) * chartW;
      const y = padding.top + ((maxVal - p.value) / range) * chartH;
      
      ctx.fillStyle = '#FFF';
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, 3.5, 0, Math.PI * 2);
      ctx.fill();
      
      // Date label
      ctx.fillStyle = 'rgba(26,21,48,0.4)';
      ctx.font = '9px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(p.label, x, h - 8);
    });
  }
};

    <div class="label">Avg Heart Rate Over Time</div>
    ${(() => {
      const runData = Storage.getAllRunStats().filter(r => r.avgHR);

    ` : ''}

    ${statsTab === 'races' ? `

    ${statsTab === 'goals' ? `

    <div class="card mb-12" style="padding:14px 16px;border-left:3px solid #9333EA">
      <div class="row-between mb-4">
        <div class="t-sm fw-7" style="color:#9333EA">👥 TAMPA DOUBLES</div>
        <div class="t-xs t-muted tabular">${Dates.formatDate(ATHLETE.doublesDate)}</div>
      </div>
      <div class="t-xs t-muted" style="line-height:1.6">Mixed doubles with Aidan at Men's Open weights. Goal: <strong>sub ${ATHLETE.doublesGoal}</strong>. Run at the slower partner's sustainable pace, switch stations every 200m.</div>
    </div>
    <div class="card mb-24" style="padding:14px 16px;border-left:3px solid var(--accent)">
      <div class="row-between mb-4">
        <div class="t-sm fw-7" style="color:var(--accent)">🏁 DALLAS SOLO — FIRST SOLO RACE</div>
        <div class="t-xs t-muted tabular">${Dates.formatDate(ATHLETE.goalDate)}</div>
      </div>
      <div class="t-xs t-muted" style="line-height:1.6">First solo Hyrox at Men's Open weights. Tiered targets:<br>• <strong>A goal: sub ${ATHLETE.goalTimeA}</strong><br>• <strong>Stretch: sub ${ATHLETE.goalTimeStretch}</strong><br>• <strong>Dream: sub ${ATHLETE.goalTimeDream}</strong></div>
    </div>

    <div class="label">Why You're Doing This Program</div>
    <div class="card mb-12" style="padding:14px 16px;border-left:3px solid var(--accent)">
      <div class="t-sm fw-7 mb-4" style="color:var(--accent)">🦵 Lower body is the lever</div>
      <div class="t-xs t-muted" style="line-height:1.6">You're racing at Men's Open weights (152 kg sled push, 20 kg sandbag lunges). Two lower-body days per week — heavy squat-dominant Tuesday + lighter posterior-chain Sunday — is intentional. It's the structural choice that makes heavy stations feel manageable.</div>

    <div class="card mb-12" style="padding:14px 16px">
      <div class="t-sm fw-7 mb-4">🏃 Running is "faster for longer"</div>
      <div class="t-xs t-muted" style="line-height:1.6">Monday long run builds aerobic base + VO2 ceiling. Saturday threshold raises race-pace ceiling. Two runs per week, each with a specific purpose, run well.</div>
    </div>
    <div class="card mb-12" style="padding:14px 16px">
      <div class="t-sm fw-7 mb-4">💪 Upper prep for heavier weights</div>
      <div class="t-xs t-muted" style="line-height:1.6">Men's Open weights are heavier than you're used to. Wednesday heavy upper builds press + pull strength that translates directly to 200 wall ball throws and sled pull speed.</div>
    </div>
    <div class="card mb-24" style="padding:14px 16px">
      <div class="t-sm fw-7 mb-4">🎯 Hyrox-specific on Thursday</div>
      <div class="t-xs t-muted" style="line-height:1.6">Thursday is where you touch race weights + practice doubles handoffs with Aidan. Light technique in Phase 1 → race weight + doubles practice in Phase 2 → full sims in Phase 3. Friday rest, Sunday posterior — locked in every week.</div>

    <div class="label">Phase Roadmap</div>

          <div class="t-sm fw-7" style="color:${p.color}">${p.emoji} ${p.name}</div>
          <div class="t-xs t-muted tabular">Wk ${p.weeks[0]}${p.weeks[0] !== p.weeks[1] ? '–' + p.weeks[1] : ''}</div>

    `).join('')}

    <div class="label">Tampa Doubles Station Targets</div>
    ${Object.entries(GOAL_SPLITS.stations).map(([name, goal]) => `
      <div class="metric">
        <span class="t-sm t-muted">${name}</span>
        <span class="t-xs fw-7 t-accent tabular">${goal.target}</span>
      </div>
    `).join('')}

    <div class="spacer"></div>
    <div class="label">Station Notes for Race Day</div>
    <div class="card mb-12" style="padding:14px 16px">
      <div class="t-sm fw-7 mb-4">⛷️ SkiErg</div>
      <div class="t-xs t-muted">Set plan, hold it. Don't blow up on the first station.</div>
    </div>
    <div class="card mb-12" style="padding:14px 16px">
      <div class="t-sm fw-7 mb-4">🛷 Sled Push (152 kg — Men's Open)</div>
      <div class="t-xs t-muted">In doubles, Aidan takes 3 lengths, you take 1. Break it into thirds if needed.</div>
    </div>
    <div class="card mb-12" style="padding:14px 16px">
      <div class="t-sm fw-7 mb-4">🪢 Sled Pull</div>
      <div class="t-xs t-muted">Hinge & lean back, drive through legs. Don't arm-pull.</div>
    </div>
    <div class="card mb-12" style="padding:14px 16px">
      <div class="t-sm fw-7 mb-4">🏃 Burpee Broad Jumps</div>
      <div class="t-xs t-muted">Steady cadence (~2 sec/rep). Don't redline this — Row is next.</div>
    </div>
    <div class="card mb-12" style="padding:14px 16px">
      <div class="t-sm fw-7 mb-4">🚣 Row</div>
      <div class="t-xs t-muted">RECOVERY station. HINGE not squat. Reset before the back half.</div>
    </div>
    <div class="card mb-12" style="padding:14px 16px">
      <div class="t-sm fw-7 mb-4">🏋️ Farmers Carry (2 × 24 kg)</div>
      <div class="t-xs t-muted">Head down, core locked, feet move FAST.</div>
    </div>
    <div class="card mb-12" style="padding:14px 16px">
      <div class="t-sm fw-7 mb-4">🦵 Sandbag Lunges (20 kg)</div>
      <div class="t-xs t-muted">First rep = last rep cadence. Hurts the same whether you go slow or fast.</div>
    </div>
    <div class="card mb-12" style="padding:14px 16px">
      <div class="t-sm fw-7 mb-4">🎯 Wall Balls (9 kg)</div>
      <div class="t-xs t-muted">Final push. Sets of 25, 3-5 breaths between. Don't fall apart at the end.</div>

    ` : ''}

function initDashboardCharts() {
  const canvas = document.getElementById('vo2-chart');
  if (canvas) {
    const points = ATHLETE.vo2maxHistory.map(p => ({ value: p.value, label: Dates.formatDateShort(p.date) }));
    Charts.lineChart(canvas, points, { color: '#7C3AED' });
  }
  // HR over time chart
  const hrCanvas = document.getElementById('hr-chart');
  if (hrCanvas) {
    const runData = Storage.getAllRunStats().filter(r => r.avgHR);
    if (runData.length >= 2) {
      const points = runData.map(r => ({ value: parseInt(r.avgHR), label: Dates.formatDateShort(r.date) }));
      Charts.lineChart(hrCanvas, points, { color: '#3B82F6' });
    }
  }
}

function initRaceCharts() {
  if (RACES.length < 2) return;
  const runChart = document.getElementById('run-pacing-chart');
  if (runChart) {
    const phoenixRuns = RACES[0].stations.filter(s => s.type === 'run');
    const houstonRuns = RACES[1].stations.filter(s => s.type === 'run');
    Charts.dualBarChart(runChart, phoenixRuns.map((pr, i) => ({
      label: 'R' + (i+1), val1: pr.seconds, val2: houstonRuns[i].seconds
    })));
  }
}


// =============================================
// APP CONTROLLER
// =============================================
const App = {
  currentView: 'today',
  selectedRPE: null,
  detailDate: null,

  init() {
    setTimeout(() => {
      const l = document.getElementById('loading');
      if (l) { l.style.opacity='0'; l.style.transition='opacity .3s'; setTimeout(()=>l.remove(),300); }
      document.getElementById('nav').style.display = 'flex';
      this.navigate('today');
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(r=>r.forEach(reg=>reg.unregister()));
        navigator.serviceWorker.register('./sw.js').catch(()=>{});
      }
    }, 400);

    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => { this.detailDate = null; this.navigate(btn.dataset.view); });
    });
  },

  navigate(view) {
    this.currentView = view;
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.view === view));
    const app = document.getElementById('app');
    switch(view) {
      case 'today': app.innerHTML = renderToday(this.detailDate); break;
      case 'plan': app.innerHTML = renderCalendar(); break;
      case 'stats': app.innerHTML = renderStats(); requestAnimationFrame(()=>{initDashboardCharts();initRaceCharts()}); break;
    }
    if (!this.detailDate) app.scrollTop = 0;
  },

  showWorkoutForDate(d) { this.detailDate = d; this.navigate('today'); },
  prevDay(d) { const dt=new Date(d+'T00:00:00'); dt.setDate(dt.getDate()-1); this.showWorkoutForDate(dt.toISOString().split('T')[0]); },
  nextDay(d) { const dt=new Date(d+'T00:00:00'); dt.setDate(dt.getDate()+1); this.showWorkoutForDate(dt.toISOString().split('T')[0]); },

  toggleExercise(dateStr, index, el) {
    const done = Storage.toggleExercise(dateStr, index);
    const check = el.querySelector('.ex-check');
    const name = el.querySelector('.t-md');
    check.classList.toggle('done', done);
    check.querySelector('svg').style.opacity = done ? 1 : 0;
    check.querySelector('svg').setAttribute('stroke', done ? '#FFF' : '#1A1530');
    if (name) { name.style.textDecoration = done ? 'line-through' : ''; name.style.opacity = done ? '.4' : ''; }
  },

  // Read every set row from the DOM, preserving each set's done flag from storage
  _collectSets(dateStr, index, totalRows) {
    const existing = Storage.getExerciseLog(dateStr, index);
    const exSets = Array.isArray(existing.sets) ? existing.sets : [];
    const sets = [];
    for (let s = 1; s <= totalRows; s++) {
      const w = document.getElementById(`log-w-${index}-${s}`)?.value || '';
      const r = document.getElementById(`log-r-${index}-${s}`)?.value || '';
      sets.push({ weight: w, reps: r, done: exSets[s-1]?.done || false });
    }
    return sets;
  },

  saveLog(dateStr, index, exName, totalRows) {
    totalRows = totalRows || 1;
    const sets = this._collectSets(dateStr, index, totalRows);
    Storage.saveExerciseLog(dateStr, index, { sets, exerciseName: exName });
  },

  toggleSet(dateStr, index, setIndex, totalRows, exName, el) {
    const sets = this._collectSets(dateStr, index, totalRows);
    if (sets[setIndex-1]) sets[setIndex-1].done = !sets[setIndex-1].done;
    Storage.saveExerciseLog(dateStr, index, { sets, exerciseName: exName });
    el.classList.toggle('on');
  },

  addSet(dateStr, index, exName, totalRows) {
    const sets = this._collectSets(dateStr, index, totalRows);
    sets.push({ weight: '', reps: '', done: false });
    Storage.saveExerciseLog(dateStr, index, { sets, exerciseName: exName });
    this.refresh();
  },

  removeSet(dateStr, index, exName, totalRows) {
    if (totalRows <= 1) return;
    const sets = this._collectSets(dateStr, index, totalRows);
    sets.pop();
    Storage.saveExerciseLog(dateStr, index, { sets, exerciseName: exName });
    this.refresh();
  },

  refresh() {
    const app = document.getElementById('app');
    const y = app ? app.scrollTop : 0;
    this.navigate(this.currentView);
    const a2 = document.getElementById('app');
    if (a2) a2.scrollTop = y;
  },

  saveRunStats(dateStr) {
    Storage.saveRunStats(dateStr, {
      avgHR: document.getElementById('rs-hr')?.value || '',
      avgPace: document.getElementById('rs-pace')?.value || '',
      distance: document.getElementById('rs-dist')?.value || '',
      vo2max: document.getElementById('rs-vo2')?.value || ''
    });
  },

  selectRPE(v) {
    this.selectedRPE = v;
    document.querySelectorAll('.rpe').forEach(b => {
      b.classList.toggle('sel', parseInt(b.dataset.rpe) === v);
    });
  },

  completeWorkout(dateStr) {
    const notes = document.getElementById('workout-notes')?.value || '';
    Storage.markWorkoutComplete(dateStr, this.selectedRPE || 0, notes);
    this.selectedRPE = null;
    this.navigate('today');
  },

  calendarPrevWeek() { if(calendarCurrentWeek>1){calendarCurrentWeek--;this.navigate('plan')} },
  calendarNextWeek() { if(calendarCurrentWeek<30){calendarCurrentWeek++;this.navigate('plan')} },
  jumpToWeek(w) { calendarCurrentWeek = w; this.navigate('plan'); },
  setStatsTab(t) { statsTab=t; this.navigate('stats'); },

  openSwap(dateStr) {
    // Get the current week's 7 days (Mon-Sun starting from this week's Monday)
    const date = new Date(dateStr + 'T00:00:00');
    const day = date.getDay(); // 0=Sun, 1=Mon...
    const diff = day === 0 ? -6 : 1 - day; // shift to Monday
    const monday = new Date(date);
    monday.setDate(date.getDate() + diff);

    const days = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      const ds = d.toISOString().split('T')[0];
      const wDate = Storage.getWorkoutDate(ds);
      let wo = null;
      for (const week of TRAINING_PLAN) {
        for (const dy of week.days) if (dy.dateStr === wDate) { wo = dy; break; }
        if (wo) break;
      }
      days.push({ dateStr: ds, dayName: d.toLocaleDateString('en-US',{weekday:'long'}), shortDate: d.toLocaleDateString('en-US',{month:'short',day:'numeric'}), workout: wo, isCurrent: ds === dateStr });
    }

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
    overlay.innerHTML = `<div class="modal">
      <div class="row-between mb-16">
        <div>
          <div class="t-lg fw-8">Swap Workout</div>
          <div class="t-xs t-muted mt-4">Pick a day to swap with</div>
        </div>
        <button onclick="this.closest('.modal-overlay').remove()" style="padding:4px 10px;color:var(--text2);font-size:20px">×</button>
      </div>
      ${days.map(d => `
        <div class="modal-day" ${d.isCurrent ? 'style="opacity:.4;pointer-events:none"' : `onclick="App.doSwap('${dateStr}','${d.dateStr}')"`}>
          <div>
            <div class="t-sm fw-7">${d.dayName} ${d.isCurrent ? '<span class="t-faint" style="font-weight:400">(current)</span>' : ''}</div>
            <div class="t-xs t-muted mt-4">${d.shortDate} · ${d.workout ? d.workout.title : 'No workout'}</div>
          </div>
          ${d.workout && !d.isCurrent ? `<div style="font-size:18px">${d.workout.icon}</div>` : ''}
        </div>
      `).join('')}
    </div>`;
    document.body.appendChild(overlay);
  },

  doSwap(date1, date2) {
    Storage.swapDays(date1, date2);
    document.querySelector('.modal-overlay')?.remove();
    this.navigate('today');
  }
};

document.addEventListener('DOMContentLoaded', () => App.init());

    </script>
